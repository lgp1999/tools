<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成 - ToolBox Pro</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-toolbox"></i>
                    <span>ToolBox Pro</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="搜索工具..." id="searchInput" autocomplete="off">
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-title">热门工具</div>
                    <ul class="nav-list">
                        <li><a href="../../index.html"><i class="fas fa-home"></i><span>首页</span></a></li>
                        <li><a href="qrcode.html" class="active"><i class="fas fa-qrcode"></i><span>二维码生成</span></a></li>
                    </ul>
                </div>
                <div class="nav-section">
                    <div class="nav-title">办公辅助</div>
                    <ul class="nav-list">
                        <li><a href="qrcode.html" class="active"><i class="fas fa-qrcode"></i><span>二维码生成</span></a></li>
                        <li><a href="barcode.html"><i class="fas fa-barcode"></i><span>条形码生成</span></a></li>
                        <li><a href="password.html"><i class="fas fa-key"></i><span>密码生成</span></a></li>
                        <li><a href="color.html"><i class="fas fa-palette"></i><span>颜色转换</span></a></li>
                    </ul>
                </div>
            </nav>
            <div class="friend-links">
                <div class="nav-title">友情链接</div>
                <a href="https://www.tapsave.net/" target="_blank" rel="noopener noreferrer" class="friend-link">
                    <i class="fas fa-external-link-alt"></i>
                    <span>TapSave</span>
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>二维码生成</h1>
                    <p class="subtitle">快速生成自定义样式二维码</p>
                </div>
            </header>
            
            <div class="page-content">
                <div class="tool-container">
                    <div class="tool-box">
                        <div class="qr-container">
                            <div class="qr-input">
                                <div class="tool-section">
                                    <label class="tool-label">内容</label>
                                    <textarea class="tool-textarea" id="qrText" placeholder="在此输入二维码内容（网址、文本等）..." style="min-height: 100px;">https://www.tapsave.net/</textarea>
                                </div>
                                
                                <div class="options-group">
                                    <div class="option-item">
                                        <label>尺寸:</label>
                                        <select class="tool-select" id="qrSize" style="width: auto;">
                                            <option value="128">128x128</option>
                                            <option value="200" selected>200x200</option>
                                            <option value="256">256x256</option>
                                            <option value="320">320x320</option>
                                            <option value="400">400x400</option>
                                        </select>
                                    </div>
                                    <div class="option-item">
                                        <label>容错率:</label>
                                        <select class="tool-select" id="qrLevel" style="width: auto;">
                                            <option value="1">L (7%)</option>
                                            <option value="0">M (15%)</option>
                                            <option value="3" selected>Q (25%)</option>
                                            <option value="2">H (30%)</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="color-picker-wrapper">
                                    <div class="color-input-group">
                                        <label>前景色:</label>
                                        <input type="color" id="qrColor" value="#000000">
                                    </div>
                                    <div class="color-input-group">
                                        <label>背景色:</label>
                                        <input type="color" id="qrBgColor" value="#ffffff">
                                    </div>
                                </div>
                                
                                <div class="tool-actions">
                                    <button class="btn btn-primary" onclick="generateQR()">
                                        <i class="fas fa-sync"></i> 生成二维码
                                    </button>
                                    <button class="btn btn-secondary" onclick="downloadQR()">
                                        <i class="fas fa-download"></i> 下载图片
                                    </button>
                                </div>
                            </div>
                            
                            <div class="qr-output">
                                <div id="qrcode"></div>
                                <p style="font-size: 13px; color: var(--text-tertiary);">扫码查看内容</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tool-box">
                        <h3 class="section-title">
                            <i class="fas fa-lightbulb"></i>
                            使用提示
                        </h3>
                        <ul style="color: var(--text-secondary); font-size: 14px; line-height: 2;">
                            <li>支持生成网址、文本、联系方式等类型的二维码</li>
                            <li>容错率越高，二维码可被遮挡的部分越多</li>
                            <li>建议使用高对比度的颜色组合以确保可扫描</li>
                            <li>生成的二维码可直接下载为PNG图片</li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <footer class="footer">
                <div class="footer-content">
                    <p class="copyright">
                        © 2024 ToolBox Pro. <a href="https://www.tapsave.net/" target="_blank">合作伙伴：TapSave</a>
                    </p>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="../../js/main.js"></script>
    <script>
        const qrText = document.getElementById('qrText');
        const qrSize = document.getElementById('qrSize');
        const qrLevel = document.getElementById('qrLevel');
        const qrColor = document.getElementById('qrColor');
        const qrBgColor = document.getElementById('qrBgColor');
        const qrcodeContainer = document.getElementById('qrcode');
        
        let qrcode = null;
        
        function generateQR() {
            const text = qrText.value.trim();
            if (!text) {
                showToast('请输入二维码内容');
                return;
            }
            
            qrcodeContainer.innerHTML = '';
            
            const levelMap = { '1': QRCode.CorrectLevel.L, '0': QRCode.CorrectLevel.M, '3': QRCode.CorrectLevel.Q, '2': QRCode.CorrectLevel.H };
            
            qrcode = new QRCode(qrcodeContainer, {
                text: text,
                width: parseInt(qrSize.value),
                height: parseInt(qrSize.value),
                colorDark: qrColor.value,
                colorLight: qrBgColor.value,
                correctLevel: levelMap[qrLevel.value]
            });
        }
        
        function downloadQR() {
            const img = qrcodeContainer.querySelector('img');
            if (!img) {
                showToast('请先生成二维码');
                return;
            }
            
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'qrcode.png';
            link.click();
        }
        
        // 页面加载时自动生成一个示例二维码
        window.addEventListener('load', () => {
            setTimeout(generateQR, 100);
        });
    </script>
</body>
</html>

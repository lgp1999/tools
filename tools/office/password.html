<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成- ToolBox Pro</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-toolbox"></i>
                    <span>ToolBox Pro</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="搜索工具..." id="searchInput" autocomplete="off">
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-title">办公辅助</div>
                    <ul class="nav-list">
                        <li><a href="qrcode.html"><i class="fas fa-qrcode"></i><span>二维码成��</span></a></li>
                        <li><a href="password.html" class="active"><i class="fas fa-key"></i><span>密码生成</span></a></li>
                    </ul>
                </div>
            </nav>
            <div class="friend-links">
                <a href="https://www.tapsave.net/zh/douyin/" target="_blank" rel="noopener noreferrer" class="friend-link">
                    <i class="fas fa-external-link-alt"></i>
                    <span>抖音视频下载 - TapSave</span>
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>密码生成/h1>
                    <p class="subtitle">生成安全随机密码</p>
                </div>
            </header>
            
            <div class="page-content">
                <div class="tool-container">
                    <div class="tool-box">
                        <div class="tool-result" style="text-align: center; padding: 30px;">
                            <div class="tool-result-content" id="password" style="font-family: monospace; font-size: 28px; letter-spacing: 2px; color: var(--primary);">-</div>
                            <div style="margin-top: 8px; font-size: 13px; color: var(--text-tertiary);" id="strength">密码强度: -</div>
                        </div>
                        
                        <div class="tool-actions" style="justify-content: center;">
                            <button class="btn btn-primary" onclick="generatePassword()" style="padding: 12px 32px;">
                                <i class="fas fa-sync"></i> 生成新密化
                            </button>
                            <button class="btn btn-secondary" onclick="copyPassword()">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        
                        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color);">
                            <div class="tool-section">
                                <label class="tool-label">密码长度: <span id="lengthVal">16</span></label>
                                <input type="range" id="length" min="6" max="64" value="16" style="width: 100%; margin-top: 8px;">
                            </div>
                            
                            <div class="options-group" style="margin-top: 16px;">
                                <div class="option-item">
                                    <input type="checkbox" id="useUpper" checked>
                                    <label for="useUpper">大写字母 (A-Z)</label>
                                </div>
                                <div class="option-item">
                                    <input type="checkbox" id="useLower" checked>
                                    <label for="useLower">小写字母 (a-z)</label>
                                </div>
                                <div class="option-item">
                                    <input type="checkbox" id="useNumbers" checked>
                                    <label for="useNumbers">数字 (0-9)</label>
                                </div>
                                <div class="option-item">
                                    <input type="checkbox" id="useSymbols" checked>
                                    <label for="useSymbols">特殊符号 (!@#$%)</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="tool-box">
                        <h3 class="section-title">
                            <i class="fas fa-shield-alt"></i>
                            密码安全建议
                        </h3>
                        <ul style="color: var(--text-secondary); font-size: 14px; line-height: 2;">
                            <li>密码长度至少12位以</li>
                            <li>包含大小写字母、数字和特殊符号</li>
                            <li>避免使用常见单词或个人信</li>
                            <li>不同网站使用不同密码</li>
                            <li>定期更换重要账户密码</li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <footer class="footer">
                <div class="footer-content">
                    <p class="copyright">
                        © 2024 ToolBox Pro. <a href="https://www.tapsave.net/zh/douyin/" target="_blank">合作伙伴：TapSave</a>
                    </p>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="../../js/main.js"></script>
    <script>
        const lengthSlider = document.getElementById('length');
        const lengthVal = document.getElementById('lengthVal');
        const passwordEl = document.getElementById('password');
        const strengthEl = document.getElementById('strength');
        
        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };
        
        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
            generatePassword();
        });
        
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', generatePassword);
        });
        
        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            const useUpper = document.getElementById('useUpper').checked;
            const useLower = document.getElementById('useLower').checked;
            const useNumbers = document.getElementById('useNumbers').checked;
            const useSymbols = document.getElementById('useSymbols').checked;
            
            if (!useUpper && !useLower && !useNumbers && !useSymbols) {
                passwordEl.textContent = '请至少选择一种字符类化;
                return;
            }
            
            let charset = '';
            if (useUpper) charset += chars.upper;
            if (useLower) charset += chars.lower;
            if (useNumbers) charset += chars.numbers;
            if (useSymbols) charset += chars.symbols;
            
            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            
            for (let i = 0; i < length; i++) {
                password += charset[array[i] % charset.length];
            }
            
            passwordEl.textContent = password;
            checkStrength(password);
        }
        
        function checkStrength(password) {
            let score = 0;
            if (password.length >= 12) score++;
            if (password.length >= 16) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;
            
            const strengthMap = ['非常化, '化, '中等', '化, '非常化];
            const colorMap = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981', '#059669'];
            
            strengthEl.textContent = '密码强度: ' + strengthMap[Math.min(score, 4)];
            strengthEl.style.color = colorMap[Math.min(score, 4)];
        }
        
        function copyPassword() {
            copyToClipboard(passwordEl.textContent);
        }
        
        // 页面加载时生成一个密化
        window.addEventListener('load', generatePassword);
    </script>
</body>
</html>

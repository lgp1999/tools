<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID生成 - ToolBox Pro</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-toolbox"></i>
                    <span>ToolBox Pro</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="搜索工具..." id="searchInput" autocomplete="off">
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-title">开发工化/div>
                    <ul class="nav-list">
                        <li><a href="uuid.html" class="active"><i class="fas fa-fingerprint"></i><span>UUID生成</span></a></li>
                        <li><a href="regex.html"><i class="fas fa-spell-check"></i><span>正则测试</span></a></li>
                    </ul>
                </div>
            </nav>
            <div class="friend-links">
                <a href="https://www.tapsave.net/zh/douyin/" target="_blank" rel="noopener noreferrer" class="friend-link">
                    <i class="fas fa-external-link-alt"></i>
                    <span>抖音视频下载 - TapSave</span>
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>UUID生成</h1>
                    <p class="subtitle">生成唯一标识化UUID v4</p>
                </div>
            </header>
            
            <div class="page-content">
                <div class="tool-container">
                    <div class="tool-box">
                        <div class="options-group">
                            <div class="option-item">
                                <label>生成数量:</label>
                                <input type="number" class="tool-input" id="uuidCount" value="5" min="1" max="100" style="width: 80px;">
                            </div>
                            <div class="option-item">
                                <input type="checkbox" id="uppercase">
                                <label for="uppercase">大写字母</label>
                            </div>
                            <div class="option-item">
                                <input type="checkbox" id="noHyphens">
                                <label for="noHyphens">去除连字</label>
                            </div>
                        </div>
                        
                        <div class="tool-section">
                            <label class="tool-label">生成化UUID</label>
                            <textarea class="tool-textarea" id="uuidOutput" readonly style="min-height: 250px; font-family: monospace; line-height: 2;"></textarea>
                        </div>
                        
                        <div class="tool-actions">
                            <button class="btn btn-primary" onclick="generateUUIDs()">
                                <i class="fas fa-sync"></i> 生成
                            </button>
                            <button class="btn btn-secondary" onclick="copyUUIDs()">
                                <i class="fas fa-copy"></i> 复制全部
                            </button>
                            <button class="btn btn-secondary" onclick="downloadUUIDs()">
                                <i class="fas fa-download"></i> 下载
                            </button>
                        </div>
                    </div>
                    
                    <div class="tool-box">
                        <h3 class="section-title">
                            <i class="fas fa-info-circle"></i>
                            关于 UUID
                        </h3>
                        <ul style="color: var(--text-secondary); font-size: 14px; line-height: 2;">
                            <li><strong>UUID</strong> (Universally Unique Identifier) 通用唯一识别</li>
                            <li>标准格式化-4-4-4-12 化2个十六进制字</li>
                            <li>版本4使用随机数生成，重复概率极低</li>
                            <li>常用于数据库主键、会话标识、分布式系统</li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <footer class="footer">
                <div class="footer-content">
                    <p class="copyright">
                        © 2024 ToolBox Pro. <a href="https://www.tapsave.net/zh/douyin/" target="_blank">合作伙伴：TapSave</a>
                    </p>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="../../js/main.js"></script>
    <script>
        const uuidCount = document.getElementById('uuidCount');
        const uppercase = document.getElementById('uppercase');
        const noHyphens = document.getElementById('noHyphens');
        const uuidOutput = document.getElementById('uuidOutput');
        
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        
        function generateUUIDs() {
            const count = parseInt(uuidCount.value) || 5;
            const uuids = [];
            
            for (let i = 0; i < count; i++) {
                let uuid = generateUUID();
                if (uppercase.checked) uuid = uuid.toUpperCase();
                if (noHyphens.checked) uuid = uuid.replace(/-/g, '');
                uuids.push(uuid);
            }
            
            uuidOutput.value = uuids.join('\n');
        }
        
        function copyUUIDs() {
            copyToClipboard(uuidOutput.value);
        }
        
        function downloadUUIDs() {
            const content = uuidOutput.value;
            if (!content) return;
            downloadFile(content, 'uuids.txt');
        }
        
        // 页面加载时成
        window.addEventListener('load', generateUUIDs);
    </script>
</body>
</html>

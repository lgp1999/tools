<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片Base64 - ToolBox Pro</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-toolbox"></i>
                    <span>ToolBox Pro</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="搜索工具..." id="searchInput" autocomplete="off">
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-title">图片工具</div>
                    <ul class="nav-list">
                        <li><a href="base64.html" class="active"><i class="fas fa-image"></i><span>图片Base64</span></a></li>
                        <li><a href="compress.html"><i class="fas fa-compress"></i><span>图片压缩</span></a></li>
                    </ul>
                </div>
            </nav>
            <div class="friend-links">
                <a href="https://www.tapsave.net/" target="_blank" rel="noopener noreferrer" class="friend-link">
                    <i class="fas fa-external-link-alt"></i>
                    <span>TapSave</span>
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>图片Base64转换</h1>
                    <p class="subtitle">图片与Base64编码互转</p>
                </div>
            </header>
            
            <div class="page-content">
                <div class="tool-container">
                    <div class="tool-box">
                        <div class="file-upload" id="fileUpload">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>拖拽图片到此处，或点击上传</p>
                            <p class="file-hint">支持 JPG、PNG、GIF、WebP 格式</p>
                            <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        </div>
                        
                        <div id="previewSection" class="hidden">
                            <div style="display: flex; gap: 24px; flex-wrap: wrap; margin-top: 20px;">
                                <div style="flex: 1; min-width: 200px;">
                                    <label class="tool-label">图片预览</label>
                                    <img id="imagePreview" style="max-width: 100%; max-height: 300px; border: 1px solid var(--border-color); border-radius: var(--radius);">
                                    <div id="imageInfo" style="margin-top: 12px; font-size: 13px; color: var(--text-secondary);"></div>
                                </div>
                                <div style="flex: 1; min-width: 200px;">
                                    <label class="tool-label">Base64 编码</label>
                                    <textarea class="tool-textarea" id="base64Output" readonly style="min-height: 150px;"></textarea>
                                    <div class="tool-actions" style="margin-top: 12px;">
                                        <button class="btn btn-primary" onclick="copyBase64()">
                                            <i class="fas fa-copy"></i> 复制
                                        </button>
                                        <button class="btn btn-secondary" onclick="downloadImage()">
                                            <i class="fas fa-download"></i> 下载图片
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-color);">
                            <label class="tool-label">Base64 转图片</label>
                            <textarea class="tool-textarea" id="base64Input" placeholder="在此粘贴Base64编码（包含 data:image 前缀或纯Base64字符串）..."></textarea>
                            <div class="tool-actions" style="margin-top: 12px;">
                                <button class="btn btn-primary" onclick="base64ToImage()">
                                    <i class="fas fa-image"></i> 转换为图片
                                </button>
                                <button class="btn btn-secondary" onclick="document.getElementById('base64Input').value = ''">
                                    <i class="fas fa-trash"></i> 清空
                                </button>
                            </div>
                            <div id="convertedImage" style="margin-top: 16px;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <footer class="footer">
                <div class="footer-content">
                    <p class="copyright">
                        © 2024 ToolBox Pro. <a href="https://www.tapsave.net/" target="_blank">合作伙伴：TapSave</a>
                    </p>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="../../js/main.js"></script>
    <script>
        const fileUpload = document.getElementById('fileUpload');
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const imagePreview = document.getElementById('imagePreview');
        const imageInfo = document.getElementById('imageInfo');
        const base64Output = document.getElementById('base64Output');
        const base64Input = document.getElementById('base64Input');
        const convertedImage = document.getElementById('convertedImage');
        
        let currentImage = null;
        
        fileUpload.addEventListener('click', () => fileInput.click());
        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('dragover');
        });
        fileUpload.addEventListener('dragleave', () => {
            fileUpload.classList.remove('dragover');
        });
        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件');
                return;
            }
            
            currentImage = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                base64Output.value = e.target.result;
                imageInfo.innerHTML = `
                    <strong>文件名:</strong> ${file.name}<br>
                    <strong>大小:</strong> ${formatFileSize(file.size)}<br>
                    <strong>类型:</strong> ${file.type}<br>
                    <strong>Base64大小:</strong> ${formatFileSize(e.target.result.length)}
                `;
                previewSection.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
        
        function copyBase64() {
            copyToClipboard(base64Output.value);
        }
        
        function downloadImage() {
            if (!imagePreview.src) return;
            const link = document.createElement('a');
            link.href = imagePreview.src;
            link.download = currentImage ? currentImage.name : 'image.png';
            link.click();
        }
        
        function base64ToImage() {
            let base64 = base64Input.value.trim();
            if (!base64) return;
            
            // 如果没有 data:image 前缀，尝试添加
            if (!base64.startsWith('data:image')) {
                base64 = 'data:image/png;base64,' + base64;
            }
            
            const img = new Image();
            img.onload = () => {
                convertedImage.innerHTML = '';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '300px';
                img.style.border = '1px solid var(--border-color)';
                img.style.borderRadius = 'var(--radius)';
                convertedImage.appendChild(img);
            };
            img.onerror = () => {
                convertedImage.innerHTML = '<p style="color: var(--danger);">无效的Base64编码</p>';
            };
            img.src = base64;
        }
    </script>
</body>
</html>
